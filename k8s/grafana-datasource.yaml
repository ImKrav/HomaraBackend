apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-datasource-config
  namespace: homara
data:
  datasource.yaml: |
    apiVersion: 1
    datasources:
      - name: PostgreSQL (Homara DB)
        type: postgres
        access: proxy
        url: homara-db:5432
        user: postgres
        database: homara
        uid: homara-postgres-ds
        jsonData:
          sslmode: 'disable'
          postgresVersion: 1700
        secureJsonData:
          password: ${POSTGRES_PASSWORD}
        isDefault: true
      - name: Loki (Homara Logs)
        type: loki
        access: proxy
        url: http://loki:3100
        uid: homara-loki-ds
        isDefault: false
        jsonData:
          maxLines: 1000
