# In production replace with sealed-secrets or your secret manager.
apiVersion: v1
kind: Secret
metadata:
  name: homara-backend-secrets
  namespace: homara
type: Opaque
stringData:
  POSTGRES_PASSWORD: "postgres"
  JWT_SECRET: "homara_jwt_secret_key_2026_secure"
  DATABASE_URL: "postgresql://postgres:postgres@homara-db:5432/homara?schema=public"
