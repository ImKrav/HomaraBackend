apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: homara-db-pvc
  namespace: homara
spec:
  accessModes: ["ReadWriteOnce"]
  resources:
    requests:
      storage: 5Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: homara-db
  namespace: homara
  labels:
    app: homara-db
spec:
  replicas: 1
  selector:
    matchLabels:
      app: homara-db
  template:
    metadata:
      labels:
        app: homara-db
    spec:
      containers:
        - name: postgres
          image: postgres:17-alpine
          imagePullPolicy: IfNotPresent
          ports:
            - name: postgres
              containerPort: 5432
              protocol: TCP
          envFrom:
            - configMapRef:
                name: homara-backend-config
            - secretRef:
                name: homara-backend-secrets
          # Sub-path so the PVC mount doesn't collide with postgres' own metadata.
          env:
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
          volumeMounts:
            - name: pgdata
              mountPath: /var/lib/postgresql/data
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          readinessProbe:
            exec:
              command: ["sh", "-c", "pg_isready -U \"$POSTGRES_USER\" -d \"$POSTGRES_DB\""]
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 5
          livenessProbe:
            exec:
              command: ["sh", "-c", "pg_isready -U \"$POSTGRES_USER\" -d \"$POSTGRES_DB\""]
            initialDelaySeconds: 30
            periodSeconds: 20
            timeoutSeconds: 5
      volumes:
        - name: pgdata
          persistentVolumeClaim:
            claimName: homara-db-pvc
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: homara-backend
  namespace: homara
  labels:
    app: homara-backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: homara-backend
  template:
    metadata:
      labels:
        app: homara-backend
    spec:
      # Block until Postgres is up; otherwise `prisma db push` (run by
      # the `start` script on every boot) races the DB and the pod
      # CrashLoopBackOffs. Same image is reused for the probe.
      initContainers:
        - name: wait-for-db
          image: postgres:17-alpine
          imagePullPolicy: IfNotPresent
          command:
            - sh
            - -c
            - |
              until pg_isready -h homara-db -p 5432 \
                    -U "$POSTGRES_USER" -d "$POSTGRES_DB"; do
                echo "Waiting for PostgreSQL at homara-db:5432...";
                sleep 2;
              done
              echo "PostgreSQL is ready."
          envFrom:
            - configMapRef:
                name: homara-backend-config
            - secretRef:
                name: homara-backend-secrets
      containers:
        - name: backend
          # imagePullPolicy: Never — the image is built directly into
          # minikube's Docker daemon (see `minikube docker-env`).
          image: homara-backend:latest
          imagePullPolicy: Never
          ports:
            - name: http
              containerPort: 5000
              protocol: TCP
          envFrom:
            - configMapRef:
                name: homara-backend-config
            - secretRef:
                name: homara-backend-secrets
          # Generous initial delay: the `start` script runs `prisma db push`
          # + `npm run seed` before opening port 5000.
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 6
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 60
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          resources:
            requests:
              memory: "512Mi"
              cpu: "200m"
            limits:
              memory: "1Gi"
              cpu: "1000m"
