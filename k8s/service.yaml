apiVersion: v1
kind: Service
metadata:
  name: homara-db
  namespace: homara
spec:
  type: ClusterIP
  selector:
    app: homara-db
  ports:
    - name: postgres
      port: 5432
      targetPort: postgres
      protocol: TCP
---
apiVersion: v1
kind: Service
metadata:
  name: homara-backend
  namespace: homara
spec:
  type: NodePort
  selector:
    app: homara-backend
  ports:
    - name: http
      port: 5000
      targetPort: http
      nodePort: 30500
      protocol: TCP
