apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-json-config
  namespace: homara
data:
  homara-dashboard.json: |
    {
      "annotations": {
        "list": [
          {
            "builtIn": 1,
            "datasource": {
              "type": "datasource",
              "uid": "grafana"
            },
            "enable": true,
            "hide": true,
            "name": "Annotations & Alerts",
            "type": "dashboard"
          }
        ]
      },
      "editable": true,
      "fiscalYearStartMonth": 0,
      "graphTooltip": 0,
      "id": null,
      "links": [],
      "liveNow": false,
      "panels": [
        {
          "type": "stat",
          "title": "Ventas Totales (Entregado)",
          "gridPos": {
            "x": 0,
            "y": 0,
            "w": 6,
            "h": 4
          },
          "id": 1,
          "datasource": {
            "type": "postgres",
            "uid": "homara-postgres-ds"
          },
          "targets": [
            {
              "datasource": {
                "type": "postgres",
                "uid": "homara-postgres-ds"
              },
              "format": "table",
              "rawQuery": true,
              "rawSql": "SELECT COALESCE(SUM(total), 0) as value FROM \"Order\" WHERE status = 'ENTREGADO';",
              "refId": "A"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "custom": {},
              "mappings": [],
              "unit": "currencyCOP",
              "decimals": 0,
              "color": {
                "mode": "fixed",
                "fixedColor": "green"
              }
            },
            "overrides": []
          },
          "options": {
            "reduceOptions": {
              "values": false,
              "calcs": ["lastNotNull"],
              "fields": ""
            },
            "orientation": "auto",
            "textMode": "value",
            "colorMode": "value",
            "graphMode": "area",
            "justifyMode": "center"
          }
        },
        {
          "type": "stat",
          "title": "Clientes Registrados",
          "gridPos": {
            "x": 6,
            "y": 0,
            "w": 6,
            "h": 4
          },
          "id": 2,
          "datasource": {
            "type": "postgres",
            "uid": "homara-postgres-ds"
          },
          "targets": [
            {
              "datasource": {
                "type": "postgres",
                "uid": "homara-postgres-ds"
              },
              "format": "table",
              "rawQuery": true,
              "rawSql": "SELECT count(*)::integer as value FROM \"User\" WHERE role = 'CUSTOMER';",
              "refId": "A"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "custom": {},
              "mappings": [],
              "unit": "none",
              "decimals": 0,
              "color": {
                "mode": "fixed",
                "fixedColor": "blue"
              }
            },
            "overrides": []
          },
          "options": {
            "reduceOptions": {
              "values": false,
              "calcs": ["lastNotNull"],
              "fields": ""
            },
            "orientation": "auto",
            "textMode": "value",
            "colorMode": "value",
            "graphMode": "none",
            "justifyMode": "center"
          }
        },
        {
          "type": "stat",
          "title": "Costo Estimado de Proyectos Activos",
          "gridPos": {
            "x": 12,
            "y": 0,
            "w": 6,
            "h": 4
          },
          "id": 3,
          "datasource": {
            "type": "postgres",
            "uid": "homara-postgres-ds"
          },
          "targets": [
            {
              "datasource": {
                "type": "postgres",
                "uid": "homara-postgres-ds"
              },
              "format": "table",
              "rawQuery": true,
              "rawSql": "SELECT COALESCE(SUM(\"estimatedCost\"), 0) as value FROM \"Project\" WHERE status = 'EN_PROGRESO';",
              "refId": "A"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "custom": {},
              "mappings": [],
              "unit": "currencyCOP",
              "decimals": 0,
              "color": {
                "mode": "fixed",
                "fixedColor": "orange"
              }
            },
            "overrides": []
          },
          "options": {
            "reduceOptions": {
              "values": false,
              "calcs": ["lastNotNull"],
              "fields": ""
            },
            "orientation": "auto",
            "textMode": "value",
            "colorMode": "value",
            "graphMode": "area",
            "justifyMode": "center"
          }
        },
        {
          "type": "stat",
          "title": "Carritos de Compra Activos",
          "gridPos": {
            "x": 18,
            "y": 0,
            "w": 6,
            "h": 4
          },
          "id": 4,
          "datasource": {
            "type": "postgres",
            "uid": "homara-postgres-ds"
          },
          "targets": [
            {
              "datasource": {
                "type": "postgres",
                "uid": "homara-postgres-ds"
              },
              "format": "table",
              "rawQuery": true,
              "rawSql": "SELECT count(*)::integer as value FROM \"Cart\";",
              "refId": "A"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "custom": {},
              "mappings": [],
              "unit": "none",
              "decimals": 0,
              "color": {
                "mode": "fixed",
                "fixedColor": "purple"
              }
            },
            "overrides": []
          },
          "options": {
            "reduceOptions": {
              "values": false,
              "calcs": ["lastNotNull"],
              "fields": ""
            },
            "orientation": "auto",
            "textMode": "value",
            "colorMode": "value",
            "graphMode": "none",
            "justifyMode": "center"
          }
        },
        {
          "type": "barchart",
          "title": "Tendencia de Ventas Mensuales 2026",
          "gridPos": {
            "x": 0,
            "y": 4,
            "w": 12,
            "h": 8
          },
          "id": 5,
          "datasource": {
            "type": "postgres",
            "uid": "homara-postgres-ds"
          },
          "targets": [
            {
              "datasource": {
                "type": "postgres",
                "uid": "homara-postgres-ds"
              },
              "format": "table",
              "rawQuery": true,
              "rawSql": "SELECT to_char(date_trunc('month', \"createdAt\"), 'YYYY-MM') as month, SUM(total) as ventas FROM \"Order\" WHERE status = 'ENTREGADO' GROUP BY month ORDER BY month;",
              "refId": "A"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "custom": {},
              "mappings": [],
              "unit": "currencyCOP"
            },
            "overrides": []
          },
          "options": {
            "orientation": "auto",
            "xField": "month",
            "colorMode": "value",
            "showValue": "auto",
            "groupWidth": 0.7,
            "barWidth": 0.6,
            "stacking": "none",
            "legend": {
              "showLegend": true,
              "displayMode": "list",
              "placement": "bottom"
            }
          }
        },
        {
          "type": "piechart",
          "title": "Estado de las Órdenes",
          "gridPos": {
            "x": 12,
            "y": 4,
            "w": 12,
            "h": 8
          },
          "id": 6,
          "datasource": {
            "type": "postgres",
            "uid": "homara-postgres-ds"
          },
          "targets": [
            {
              "datasource": {
                "type": "postgres",
                "uid": "homara-postgres-ds"
              },
              "format": "table",
              "rawQuery": true,
              "rawSql": "SELECT status as metric, count(*)::integer as value FROM \"Order\" GROUP BY status;",
              "refId": "A"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "custom": {},
              "mappings": []
            },
            "overrides": []
          },
          "options": {
            "reduceOptions": {
              "values": true,
              "calcs": []
            },
            "pieType": "donut",
            "displayLabels": ["value", "percent"],
            "legend": {
              "showLegend": true,
              "displayMode": "list",
              "placement": "right"
            }
          }
        },
        {
          "type": "barchart",
          "title": "Top 5 Productos Más Vendidos (Unidades)",
          "gridPos": {
            "x": 0,
            "y": 12,
            "w": 12,
            "h": 8
          },
          "id": 7,
          "datasource": {
            "type": "postgres",
            "uid": "homara-postgres-ds"
          },
          "targets": [
            {
              "datasource": {
                "type": "postgres",
                "uid": "homara-postgres-ds"
              },
              "format": "table",
              "rawQuery": true,
              "rawSql": "SELECT p.name as producto, SUM(oi.quantity)::integer as cantidad FROM \"OrderItem\" oi JOIN \"Product\" p ON oi.\"productId\" = p.id JOIN \"Order\" o ON oi.\"orderId\" = o.id WHERE o.status = 'ENTREGADO' GROUP BY p.name ORDER BY cantidad DESC LIMIT 5;",
              "refId": "A"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "custom": {},
              "mappings": []
            },
            "overrides": []
          },
          "options": {
            "orientation": "horizontal",
            "xField": "producto",
            "colorMode": "value",
            "showValue": "auto",
            "groupWidth": 0.7,
            "barWidth": 0.6,
            "stacking": "none",
            "legend": {
              "showLegend": false
            }
          }
        },
        {
          "type": "piechart",
          "title": "Proyectos por Estado",
          "gridPos": {
            "x": 12,
            "y": 12,
            "w": 6,
            "h": 8
          },
          "id": 8,
          "datasource": {
            "type": "postgres",
            "uid": "homara-postgres-ds"
          },
          "targets": [
            {
              "datasource": {
                "type": "postgres",
                "uid": "homara-postgres-ds"
              },
              "format": "table",
              "rawQuery": true,
              "rawSql": "SELECT status as metric, count(*)::integer as value FROM \"Project\" GROUP BY status;",
              "refId": "A"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "custom": {},
              "mappings": []
            },
            "overrides": []
          },
          "options": {
            "reduceOptions": {
              "values": true,
              "calcs": []
            },
            "pieType": "pie",
            "displayLabels": ["value"],
            "legend": {
              "showLegend": true,
              "displayMode": "list",
              "placement": "bottom"
            }
          }
        },
        {
          "type": "barchart",
          "title": "Proyectos por Tipo de Superficie",
          "gridPos": {
            "x": 18,
            "y": 12,
            "w": 6,
            "h": 8
          },
          "id": 9,
          "datasource": {
            "type": "postgres",
            "uid": "homara-postgres-ds"
          },
          "targets": [
            {
              "datasource": {
                "type": "postgres",
                "uid": "homara-postgres-ds"
              },
              "format": "table",
              "rawQuery": true,
              "rawSql": "SELECT type as metric, count(*)::integer as value FROM \"Project\" GROUP BY type;",
              "refId": "A"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "custom": {},
              "mappings": []
            },
            "overrides": []
          },
          "options": {
            "orientation": "auto",
            "xField": "metric",
            "colorMode": "value",
            "showValue": "auto",
            "groupWidth": 0.7,
            "barWidth": 0.6,
            "stacking": "none",
            "legend": {
              "showLegend": false
            }
          }
        },
        {
          "type": "logs",
          "title": "Logs en Tiempo Real del Clúster (Namespace: homara)",
          "gridPos": {
            "x": 0,
            "y": 20,
            "w": 24,
            "h": 10
          },
          "id": 10,
          "datasource": {
            "type": "loki",
            "uid": "homara-loki-ds"
          },
          "targets": [
            {
              "datasource": {
                "type": "loki",
                "uid": "homara-loki-ds"
              },
              "expr": "{namespace=\"homara\"}",
              "refId": "A"
            }
          ],
          "options": {
            "showLabels": true,
            "wrapLogMessage": true,
            "enableLogDetails": true,
            "showTime": true,
            "sortOrder": "Descending",
            "showCommonLabels": false
          }
        }
      ],
      "refresh": "10s",
      "schemaVersion": 38,
      "style": "dark",
      "tags": ["homara"],
      "templating": {
        "list": []
      },
      "time": {
        "from": "now-6M",
        "to": "now"
      },
      "timepicker": {},
      "timezone": "",
      "title": "Homara Operations & Business Dashboard",
      "uid": "homara-operations",
      "version": 1,
      "weekStart": ""
    }
